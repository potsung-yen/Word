<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人生字資料庫</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>生字資料庫</h1>
        
        <div class="input-section">
            <input type="text" id="wordInput" placeholder="輸入英文生字..." autocomplete="off">
            <input type="text" id="transInput" placeholder="輸入中文翻譯..." autocomplete="off">
            <button onclick="addWord()" class="main-add-btn">新增紀錄</button>
        </div>

        <div class="action-bar">
            <button onclick="exportCSV()" class="secondary-btn">匯出備份</button>
            <button onclick="generateQuiz()" class="quiz-start-btn">生成測驗卡</button>
        </div>

        <div id="quizArea" class="quiz-container" style="display:none;">
            <div class="quiz-header">
                <h3>單字挑戰</h3>
                <button onclick="document.getElementById('quizArea').style.display='none'" class="close-text-btn">關閉</button>
            </div>
            <div id="quizContent"></div>
        </div>

        <table id="wordTable">
            <thead>
                <tr>
                    <th width="45%">生字</th>
                    <th width="35%">翻譯</th>
                    <th width="20%">紀錄</th>
                </tr>
            </thead>
            <tbody id="wordList"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
